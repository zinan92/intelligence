commands:
  test: python3 -m pytest tests/ -x -q
  typecheck: echo "No typecheck configured (static HTML prototype)"
  lint: echo "No lint configured (static HTML prototype)"
  validate_json: python3 -c "import json; json.load(open('dashboard/data/jade_dashboard.json')); print('JSON valid')"

services:
