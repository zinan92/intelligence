<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title</title>
  <style>
    :root {
      --bg: #0b0b12;
      --surface: #14141f;
      --surface-raised: #1c1c2e;
      --border: #2a2a3c;
      --text: #dfe0ec;
      --text-muted: #8889a0;
      --accent: #6e8efb;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --purple: #a78bfa;
      --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.6; padding: 2.5rem 1.5rem; }
    main { max-width: 880px; margin: 0 auto; }

    /* Hero */
    .hero { padding-bottom: 2rem; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); }
    .hero h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 0.5rem; }
    .hero .summary { color: var(--text-muted); font-size: 0.88rem; line-height: 1.55; margin-bottom: 1.25rem; }
    .score-bar { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
    .badge { display: inline-flex; align-items: center; padding: 0.3rem 0.7rem; border-radius: 5px; font-family: var(--mono); font-size: 0.78rem; font-weight: 500; white-space: nowrap; }
    .badge.score { background: var(--accent); color: #fff; font-size: 1.05rem; font-weight: 700; padding: 0.35rem 0.85rem; border-radius: 6px; }
    .badge.confidence { border: 1px solid var(--border); }
    .badge.confidence-high { background: rgba(52,211,153,0.12); color: var(--green); border-color: rgba(52,211,153,0.4); }
    .badge.confidence-medium { background: rgba(251,191,36,0.12); color: var(--amber); border-color: rgba(251,191,36,0.4); }
    .badge.confidence-low { background: rgba(248,113,113,0.12); color: var(--red); border-color: rgba(248,113,113,0.4); }
    .badge.classification { background: var(--surface-raised); color: var(--text-muted); border: 1px solid var(--border); }

    /* Sections */
    .report-section { margin-bottom: 2.25rem; }
    .report-section h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.85rem; padding-bottom: 0.45rem; border-bottom: 1px solid var(--border); }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 1.35rem; margin-bottom: 0.65rem; }
    .card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.85rem; }

    /* Field grid */
    .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.85rem; }
    .field-grid:not(:empty) { margin-bottom: 0.85rem; }
    .field { display: flex; flex-direction: column; gap: 0.15rem; }
    .field .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .field .value { font-family: var(--mono); font-size: 0.88rem; }

    /* Bullets */
    .bullets { list-style: none; padding: 0; }
    .bullets li { padding: 0.35rem 0 0.35rem 1rem; position: relative; font-size: 0.84rem; color: var(--text-muted); line-height: 1.5; }
    .bullets li::before { content: '\203A'; position: absolute; left: 0; color: var(--accent); font-weight: 600; }
    .bullets a { color: var(--accent); text-decoration: none; word-break: break-all; }
    .bullets a:hover { text-decoration: underline; }

    /* Section accents */
    .evidence-buckets .card { border-left: 3px solid var(--accent); }
    .trend-clusters .card { border-left: 3px solid var(--green); }
    .product-priorities .card { border-left: 3px solid var(--amber); }
    .design-briefs .card { border-left: 3px solid var(--purple); }

    /* Footer */
    .report-footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.72rem; font-family: var(--mono); }

    @media (max-width: 640px) {
      body { padding: 1.25rem 1rem; }
      .field-grid { grid-template-columns: 1fr 1fr; }
      .hero h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1>$title</h1>
      <p class="summary">$summary</p>
      $hero_metrics
    </header>
    $sections
    <footer class="report-footer">
      Generated by intelligence engine
    </footer>
  </main>
</body>
</html>
