<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方向地图 - 翡翠信号图谱</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page-specific styles for direction map bubble matrix */
    .page-header {
      margin-bottom: var(--space-xl);
    }
    
    .page-title {
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-sm);
    }
    
    .page-subtitle {
      font-size: var(--font-size-lg);
      color: var(--color-text-secondary);
    }
    
    .stats-summary {
      background-color: var(--color-bg-primary);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-lg);
    }
    
    .stat-box {
      text-align: center;
    }
    
    .stat-value {
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-brand-primary);
      margin-bottom: var(--space-xs);
    }
    
    .stat-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    
    /* Bubble matrix container */
    .bubble-matrix-container {
      background-color: var(--color-bg-primary);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-2xl);
      box-shadow: var(--shadow-md);
      margin-bottom: var(--space-xl);
    }
    
    .matrix-header {
      margin-bottom: var(--space-xl);
    }
    
    .matrix-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-sm);
    }
    
    .matrix-description {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
    }
    
    /* SVG matrix */
    #bubble-matrix-svg {
      width: 100%;
      height: 600px;
      background-color: var(--color-bg-secondary);
      border-radius: var(--radius-md);
    }
    
    /* Bubble styles */
    .bubble {
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    
    .bubble:hover {
      opacity: 0.85;
      stroke-width: 3;
    }
    
    .bubble-label {
      font-size: 12px;
      font-weight: 600;
      fill: var(--color-text-primary);
      pointer-events: none;
      user-select: none;
    }
    
    /* Axis styles */
    .axis-line {
      stroke: var(--color-border-medium);
      stroke-width: 2;
    }
    
    .axis-label {
      font-size: 14px;
      font-weight: 600;
      fill: var(--color-text-secondary);
    }
    
    .axis-tick-label {
      font-size: 11px;
      fill: var(--color-text-tertiary);
    }
    
    .grid-line {
      stroke: var(--color-border-light);
      stroke-width: 1;
      stroke-dasharray: 4,4;
    }
    
    /* Legend */
    .matrix-legend {
      margin-top: var(--space-xl);
      padding: var(--space-lg);
      background-color: var(--color-bg-secondary);
      border-radius: var(--radius-md);
    }
    
    .legend-title {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-md);
    }
    
    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-lg);
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .legend-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
    }
    
    @media (max-width: 1280px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      #bubble-matrix-svg {
        height: 500px;
      }
    }
    
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      #bubble-matrix-svg {
        height: 400px;
      }
      
      .bubble-matrix-container {
        padding: var(--space-lg);
      }
    }
  </style>
</head>
<body>
  <!-- Navigation bar will be auto-injected by nav.js -->
  <div id="nav-container"></div>

  <div class="container">
    <!-- Page header -->
    <header class="page-header">
      <h1 class="page-title">方向地图</h1>
      <p class="page-subtitle">机会 × 风险 战略矩阵，气泡大小代表热度</p>
    </header>
    
    <!-- Stats summary -->
    <div class="stats-summary">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="total-directions">0</div>
          <div class="stat-label">追踪方向总数</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" style="color: var(--color-judgment-zhidegeng);" id="count-zhidegeng">0</div>
          <div class="stat-label">值得跟</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" style="color: var(--color-judgment-guanchazu);" id="count-guanchazu">0</div>
          <div class="stat-label">观察中</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" style="color: var(--color-judgment-duanrezaoyin);" id="count-duanrezaoyin">0</div>
          <div class="stat-label">短热噪音</div>
        </div>
      </div>
    </div>
    
    <!-- Bubble Matrix -->
    <div class="bubble-matrix-container">
      <div class="matrix-header">
        <h2 class="matrix-title">机会 × 风险 战略矩阵</h2>
        <p class="matrix-description">
          横轴代表机会值（0-100），纵轴代表风险值（0-100），气泡大小代表热度。点击任何气泡查看该方向详情。
        </p>
      </div>
      
      <!-- SVG Matrix -->
      <svg id="bubble-matrix-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
        <!-- Will be populated by JavaScript -->
      </svg>
      
      <!-- Legend -->
      <div class="matrix-legend">
        <div class="legend-title">判断状态</div>
        <div class="legend-items" id="legend-items">
          <!-- Will be populated by JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <!-- Load shared JavaScript modules -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/nav.js"></script>

  <!-- Page-specific initialization -->
  <script>
    let allDirections = [];
    
    /**
     * Initialize the direction map page
     */
    async function initDirectionMap() {
      try {
        // Load dashboard data
        const data = await loadDashboardData();
        
        // Store all directions
        allDirections = getTrendDirections(data);
        
        // Render stats summary
        renderStatsSummary(data);
        
        // Render bubble matrix
        renderBubbleMatrix();
        
        // Render legend
        renderLegend();
        
      } catch (error) {
        console.error('Failed to initialize direction map page:', error);
        document.querySelector('.container').innerHTML = `
          <div class="card" style="margin-top: var(--space-2xl); text-align: center; padding: var(--space-2xl);">
            <div class="card-body">
              <h2 style="font-size: var(--font-size-3xl); color: var(--color-danger); margin-bottom: var(--space-lg);">
                ❌ 数据加载失败
              </h2>
              <p style="font-size: var(--font-size-lg); color: var(--color-text-secondary); margin-bottom: var(--space-md);">
                无法加载方向地图数据。请检查数据文件是否存在，或稍后重试。
              </p>
              <p style="font-size: var(--font-size-sm); color: var(--color-text-tertiary); margin-bottom: var(--space-xl);">
                错误信息: ${error.message}
              </p>
              <a href="index.html" class="button" style="display: inline-block; background-color: var(--color-brand-primary); color: white; padding: var(--space-md) var(--space-xl); border-radius: var(--radius-md); text-decoration: none; font-weight: var(--font-weight-semibold); margin-right: var(--space-md);">
                返回首页
              </a>
              <button onclick="location.reload()" class="button" style="display: inline-block; background-color: var(--color-secondary); color: white; padding: var(--space-md) var(--space-xl); border-radius: var(--radius-md); border: none; cursor: pointer; font-weight: var(--font-weight-semibold);">
                重新加载
              </button>
            </div>
          </div>
        `;
      }
    }
    
    /**
     * Render stats summary
     */
    function renderStatsSummary(data) {
      const directions = getTrendDirections(data);
      
      // Total count
      document.getElementById('total-directions').textContent = directions.length;
      
      // Count by judgment state
      const judgmentCounts = {
        '值得跟': 0,
        '观察中': 0,
        '短热噪音': 0,
        '需要补证据': 0
      };
      
      directions.forEach(dir => {
        if (judgmentCounts.hasOwnProperty(dir.judgment_state)) {
          judgmentCounts[dir.judgment_state]++;
        }
      });
      
      document.getElementById('count-zhidegeng').textContent = judgmentCounts['值得跟'];
      document.getElementById('count-guanchazu').textContent = judgmentCounts['观察中'];
      document.getElementById('count-duanrezaoyin').textContent = judgmentCounts['短热噪音'];
    }
    
    /**
     * Get judgment color
     */
    function getJudgmentColor(judgmentState) {
      const colorMap = {
        '值得跟': '#10b981',
        '观察中': '#3b82f6',
        '短热噪音': '#f59e0b',
        '需要补证据': '#6b7280'
      };
      return colorMap[judgmentState] || '#6b7280';
    }
    
    /**
     * Render bubble matrix
     */
    function renderBubbleMatrix() {
      const svg = document.getElementById('bubble-matrix-svg');
      if (!svg) return;
      
      // Clear existing content
      svg.innerHTML = '';
      
      // SVG dimensions and margins
      const width = 1000;
      const height = 600;
      const margin = { top: 40, right: 60, bottom: 60, left: 80 };
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      
      // Scales
      const xScale = (value) => margin.left + (value / 100) * plotWidth;
      const yScale = (value) => margin.top + ((100 - value) / 100) * plotHeight; // Inverted Y
      const sizeScale = (heat) => Math.max(15, Math.min(50, (heat / 100) * 50));
      
      // Draw grid lines
      const gridGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      for (let i = 0; i <= 100; i += 25) {
        // Vertical grid lines
        const vLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        vLine.setAttribute('x1', xScale(i));
        vLine.setAttribute('y1', margin.top);
        vLine.setAttribute('x2', xScale(i));
        vLine.setAttribute('y2', margin.top + plotHeight);
        vLine.setAttribute('class', 'grid-line');
        gridGroup.appendChild(vLine);
        
        // Horizontal grid lines
        const hLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        hLine.setAttribute('x1', margin.left);
        hLine.setAttribute('y1', yScale(i));
        hLine.setAttribute('x2', margin.left + plotWidth);
        hLine.setAttribute('y2', yScale(i));
        hLine.setAttribute('class', 'grid-line');
        gridGroup.appendChild(hLine);
      }
      svg.appendChild(gridGroup);
      
      // Draw axes
      const axisGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      
      // X-axis
      const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      xAxis.setAttribute('x1', margin.left);
      xAxis.setAttribute('y1', margin.top + plotHeight);
      xAxis.setAttribute('x2', margin.left + plotWidth);
      xAxis.setAttribute('y2', margin.top + plotHeight);
      xAxis.setAttribute('class', 'axis-line');
      axisGroup.appendChild(xAxis);
      
      // Y-axis
      const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      yAxis.setAttribute('x1', margin.left);
      yAxis.setAttribute('y1', margin.top);
      yAxis.setAttribute('x2', margin.left);
      yAxis.setAttribute('y2', margin.top + plotHeight);
      yAxis.setAttribute('class', 'axis-line');
      axisGroup.appendChild(yAxis);
      
      svg.appendChild(axisGroup);
      
      // X-axis label
      const xLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      xLabel.setAttribute('x', margin.left + plotWidth / 2);
      xLabel.setAttribute('y', height - 20);
      xLabel.setAttribute('text-anchor', 'middle');
      xLabel.setAttribute('class', 'axis-label');
      xLabel.textContent = '机会 →';
      svg.appendChild(xLabel);
      
      // Y-axis label
      const yLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      yLabel.setAttribute('x', 20);
      yLabel.setAttribute('y', margin.top + plotHeight / 2);
      yLabel.setAttribute('text-anchor', 'middle');
      yLabel.setAttribute('transform', `rotate(-90, 20, ${margin.top + plotHeight / 2})`);
      yLabel.setAttribute('class', 'axis-label');
      yLabel.textContent = '← 风险';
      svg.appendChild(yLabel);
      
      // Axis tick labels
      const tickLabels = [0, 25, 50, 75, 100];
      tickLabels.forEach(tick => {
        // X-axis ticks
        const xTick = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        xTick.setAttribute('x', xScale(tick));
        xTick.setAttribute('y', margin.top + plotHeight + 25);
        xTick.setAttribute('text-anchor', 'middle');
        xTick.setAttribute('class', 'axis-tick-label');
        xTick.textContent = tick;
        svg.appendChild(xTick);
        
        // Y-axis ticks
        const yTick = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        yTick.setAttribute('x', margin.left - 15);
        yTick.setAttribute('y', yScale(tick) + 4);
        yTick.setAttribute('text-anchor', 'end');
        yTick.setAttribute('class', 'axis-tick-label');
        yTick.textContent = tick;
        svg.appendChild(yTick);
      });
      
      // Draw bubbles
      const bubbleGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      
      allDirections.forEach(dir => {
        const cx = xScale(dir.opportunity || 50);
        const cy = yScale(dir.risk || 50);
        const r = sizeScale(dir.heat || 50);
        const color = getJudgmentColor(dir.judgment_state);
        
        // Bubble circle
        const bubble = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        bubble.setAttribute('cx', cx);
        bubble.setAttribute('cy', cy);
        bubble.setAttribute('r', r);
        bubble.setAttribute('fill', color);
        bubble.setAttribute('fill-opacity', '0.7');
        bubble.setAttribute('stroke', color);
        bubble.setAttribute('stroke-width', '2');
        bubble.setAttribute('class', 'bubble');
        bubble.setAttribute('data-direction-id', dir.id);
        bubble.style.cursor = 'pointer';
        
        // Click handler
        bubble.addEventListener('click', () => {
          window.location.href = `direction-detail.html?id=${dir.id}`;
        });
        
        bubbleGroup.appendChild(bubble);
        
        // Bubble label (direction name)
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', cx);
        label.setAttribute('y', cy + r + 15);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('class', 'bubble-label');
        label.textContent = dir.name;
        
        bubbleGroup.appendChild(label);
      });
      
      svg.appendChild(bubbleGroup);
    }
    
    /**
     * Render legend
     */
    function renderLegend() {
      const container = document.getElementById('legend-items');
      if (!container) return;
      
      const judgmentStates = [
        { state: '值得跟', color: '#10b981' },
        { state: '观察中', color: '#3b82f6' },
        { state: '短热噪音', color: '#f59e0b' },
        { state: '需要补证据', color: '#6b7280' }
      ];
      
      container.innerHTML = judgmentStates.map(({ state, color }) => `
        <div class="legend-item">
          <div class="legend-dot" style="background-color: ${color};"></div>
          <span class="legend-label">${state}</span>
        </div>
      `).join('');
    }
    
    // Initialize on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initDirectionMap);
    } else {
      initDirectionMap();
    }
  </script>
</body>
</html>
