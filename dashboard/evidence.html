<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>证据库 - 翡翠信号图谱</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page-specific styles for Evidence Wall */
    .evidence-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
    }
    
    @media (max-width: 968px) {
      .evidence-container {
        gap: var(--space-lg);
      }
    }
    
    /* === Header with inline filters === */
    .evidence-header {
      background-color: var(--color-bg-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-sm);
    }
    
    .header-top {
      margin-bottom: var(--space-lg);
    }
    
    .header-top h1 {
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-sm);
    }
    
    .header-top .subtitle {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
    }
    
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-md);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--color-border-light);
    }
    
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border-medium);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
    }
    
    .filter-chip:hover {
      background-color: var(--color-bg-tertiary);
      border-color: var(--color-brand-primary);
      color: var(--color-brand-primary);
    }
    
    .filter-chip.active {
      background-color: var(--color-brand-primary);
      border-color: var(--color-brand-primary);
      color: white;
      font-weight: var(--font-weight-medium);
    }
    
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      align-items: center;
    }
    
    .filter-group-label {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: var(--space-sm);
    }
    
    /* === Evidence Wall (Waterfall Grid) === */
    .evidence-wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    
    @media (max-width: 1280px) {
      .evidence-wall {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }
    
    @media (max-width: 768px) {
      .evidence-wall {
        grid-template-columns: 1fr;
      }
    }
    
    .wall-card {
      background-color: var(--color-bg-primary);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      cursor: pointer;
      transition: all var(--transition-base);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      box-shadow: var(--shadow-sm);
    }
    
    .wall-card:hover {
      border-color: var(--color-brand-primary);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    
    .wall-card-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
    }
    
    .wall-card-icon {
      font-size: var(--font-size-2xl);
      flex-shrink: 0;
    }
    
    .wall-card-title-area {
      flex: 1;
      min-width: 0;
    }
    
    .wall-card-title {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-xs);
      line-height: var(--line-height-tight);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    
    .wall-card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
    }
    
    .wall-card-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    
    .wall-card-relevance {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    
    .wall-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--color-border-light);
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
    }
    
    .wall-card-direction {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-brand-primary);
      font-weight: var(--font-weight-medium);
    }
    
    .wall-card-source {
      flex-shrink: 0;
    }
    
    .no-results {
      grid-column: 1 / -1;
      background-color: var(--color-bg-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-3xl);
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    
    .no-results-icon {
      font-size: var(--font-size-4xl);
      margin-bottom: var(--space-lg);
    }
    
    .no-results h3 {
      font-size: var(--font-size-xl);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-sm);
    }
    
    .no-results p {
      font-size: var(--font-size-base);
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>
  <!-- Navigation bar will be auto-injected by nav.js -->
  <div id="nav-container"></div>

  <div class="container">
    <div class="evidence-container">
      <!-- === HEADER with Filters === -->
      <header class="evidence-header">
        <div class="header-top">
          <h1>证据库</h1>
          <p class="subtitle">
            精选 28 条高质量证据，展示每条证据如何支撑趋势判断、关联哪个方向、为什么重要。
            所有证据都经过策展，强调相关性和新鲜度，而非原始数据堆砌。
          </p>
        </div>
        
        <div class="filter-bar">
          <!-- Judgment state filters -->
          <div class="filter-group">
            <span class="filter-group-label">方向:</span>
            <div class="filter-chip active" data-filter-type="direction" data-filter-value="all">
              全部方向
            </div>
            <div id="direction-filters">
              <!-- Will be populated by JavaScript -->
            </div>
          </div>
          
          <!-- Type filters -->
          <div class="filter-group">
            <span class="filter-group-label">类型:</span>
            <div class="filter-chip active" data-filter-type="type" data-filter-value="all">
              全部类型
            </div>
            <div class="filter-chip" data-filter-type="type" data-filter-value="笔记">
              📝 笔记
            </div>
            <div class="filter-chip" data-filter-type="type" data-filter-value="图片">
              🖼️ 图片
            </div>
            <div class="filter-chip" data-filter-type="type" data-filter-value="评论">
              💬 评论
            </div>
          </div>
          
          <!-- Freshness filters -->
          <div class="filter-group">
            <span class="filter-group-label">新鲜度:</span>
            <div class="filter-chip active" data-filter-type="freshness" data-filter-value="all">
              全部
            </div>
            <div class="filter-chip" data-filter-type="freshness" data-filter-value="最近3天">
              最近3天
            </div>
            <div class="filter-chip" data-filter-type="freshness" data-filter-value="最近7天">
              最近7天
            </div>
            <div class="filter-chip" data-filter-type="freshness" data-filter-value="最近14天">
              最近14天
            </div>
          </div>
        </div>
      </header>
      
      <!-- === EVIDENCE WALL (Waterfall Grid) === -->
      <div class="evidence-wall" id="evidence-wall">
        <!-- Will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Load shared JavaScript modules -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/nav.js"></script>

  <!-- Page-specific initialization -->
  <script>
    // Global state
    let allEvidence = [];
    let filteredEvidence = [];
    let activeFilters = {
      direction: 'all',
      type: 'all',
      freshness: 'all'
    };
    
    /**
     * Get direction name from URL parameter (for pre-filtering)
     */
    function getDirectionFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('direction') || null;
    }
    
    /**
     * Initialize the Evidence Library page
     */
    async function initEvidenceLibrary() {
      try {
        // Load dashboard data
        const data = await loadDashboardData();
        
        // Store all evidence
        allEvidence = getEvidenceEntries(data);
        
        // Initialize direction filters
        initializeDirectionFilters(data);
        
        // Check for direction pre-filter from URL
        const directionParam = getDirectionFromUrl();
        if (directionParam) {
          activeFilters.direction = directionParam;
        }
        
        // Apply filters and render
        applyFilters();
        
        // Set up filter event listeners
        setupFilterListeners();
        
      } catch (error) {
        console.error('Failed to initialize evidence library:', error);
        document.querySelector('.evidence-container').innerHTML = `
          <div class="card" style="text-align: center; padding: var(--space-2xl);">
            <div class="card-body">
              <h2 style="font-size: var(--font-size-3xl); color: var(--color-danger); margin-bottom: var(--space-lg);">
                ❌ 数据加载失败
              </h2>
              <p style="font-size: var(--font-size-lg); color: var(--color-text-secondary); margin-bottom: var(--space-md);">
                无法加载证据库数据。请检查数据文件是否存在，或稍后重试。
              </p>
              <p style="font-size: var(--font-size-sm); color: var(--color-text-tertiary); margin-bottom: var(--space-xl);">
                错误信息: ${error.message}
              </p>
              <a href="index.html" class="button" style="display: inline-block; background-color: var(--color-brand-primary); color: white; padding: var(--space-md) var(--space-xl); border-radius: var(--radius-md); text-decoration: none; font-weight: var(--font-weight-semibold); margin-right: var(--space-md);">
                返回首页
              </a>
              <button onclick="location.reload()" class="button" style="display: inline-block; background-color: var(--color-secondary); color: white; padding: var(--space-md) var(--space-xl); border-radius: var(--radius-md); border: none; cursor: pointer; font-weight: var(--font-weight-semibold);">
                重新加载
              </button>
            </div>
          </div>
        `;
      }
    }
    
    /**
     * Initialize direction filter chips
     */
    function initializeDirectionFilters(data) {
      const directions = getTrendDirections(data);
      
      // Cache directions globally for dynamic ID mapping
      window.cachedDirections = directions;
      
      const container = document.getElementById('direction-filters');
      
      if (!container) return;
      
      // Create filter chips for each direction
      container.innerHTML = directions.map(dir => `
        <div class="filter-chip" data-filter-type="direction" data-filter-value="${dir.name}">
          ${dir.name}
        </div>
      `).join('');
    }
    
    /**
     * Set up filter event listeners
     */
    function setupFilterListeners() {
      // Listen to all filter chips
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', function() {
          const filterType = this.dataset.filterType;
          const filterValue = this.dataset.filterValue;
          
          // Remove active from siblings
          const siblings = this.parentElement.querySelectorAll('.filter-chip');
          siblings.forEach(s => s.classList.remove('active'));
          
          // Add active to clicked chip
          this.classList.add('active');
          
          // Update active filters
          activeFilters[filterType] = filterValue;
          
          // Re-apply filters
          applyFilters();
        });
      });
    }
    
    /**
     * Apply filters to evidence list
     */
    function applyFilters() {
      filteredEvidence = allEvidence.filter(evidence => {
        // Direction filter
        if (activeFilters.direction !== 'all') {
          if (evidence.related_direction !== activeFilters.direction) {
            return false;
          }
        }
        
        // Type filter
        if (activeFilters.type !== 'all') {
          if (evidence.type !== activeFilters.type) {
            return false;
          }
        }
        
        // Freshness filter
        if (activeFilters.freshness !== 'all') {
          if (evidence.freshness !== activeFilters.freshness) {
            return false;
          }
        }
        
        return true;
      });
      
      // Render the evidence wall
      renderEvidenceWall();
    }
    
    /**
     * Render evidence wall (waterfall grid)
     */
    function renderEvidenceWall() {
      const container = document.getElementById('evidence-wall');
      
      if (!container) return;
      
      if (filteredEvidence.length === 0) {
        container.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">🔍</div>
            <h3>未找到匹配的证据</h3>
            <p>请尝试调整筛选条件查看更多证据</p>
          </div>
        `;
        return;
      }
      
      const typeIconMap = {
        '笔记': '📝',
        '图片': '🖼️',
        '评论': '💬'
      };
      
      const weightBadgeMap = {
        'high': 'badge-success',
        'medium': 'badge-warning',
        'low': 'badge-info'
      };
      
      const weightLabelMap = {
        'high': '高权重',
        'medium': '中权重',
        'low': '低权重'
      };
      
      container.innerHTML = filteredEvidence.map(evidence => {
        const typeIcon = typeIconMap[evidence.type] || '📄';
        const weightBadge = weightBadgeMap[evidence.weight] || 'badge-warning';
        const weightLabel = weightLabelMap[evidence.weight] || '中权重';
        
        return `
          <div class="wall-card" onclick="navigateToDirection('${evidence.related_direction}')">
            <div class="wall-card-header">
              <div class="wall-card-icon">${typeIcon}</div>
              <div class="wall-card-title-area">
                <h3 class="wall-card-title">${evidence.title}</h3>
                <div class="wall-card-badges">
                  <span class="badge badge-sm ${weightBadge}">${weightLabel}</span>
                  <span class="badge badge-sm badge-info">${evidence.type}</span>
                  <span class="freshness" style="font-size: var(--font-size-xs);">${evidence.freshness}</span>
                </div>
              </div>
            </div>
            
            <div class="wall-card-content">
              <div class="wall-card-relevance">
                <strong>为什么重要:</strong> ${evidence.relevance_explanation}
              </div>
              
              <div class="wall-card-meta">
                <span class="wall-card-direction">→ ${evidence.related_direction}</span>
                <span class="wall-card-source">${evidence.source}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    /**
     * Navigate to direction detail page
     */
    function navigateToDirection(directionName) {
      // Build direction-name-to-ID map dynamically from loaded data
      // This prevents hardcoding bugs where IDs get swapped
      const directionIdMap = {};
      allEvidence.forEach(evidence => {
        // Build map from evidence's related_direction field
        if (evidence.related_direction && !directionIdMap[evidence.related_direction]) {
          // Find the actual direction object to get its ID
          const matchingDir = window.cachedDirections?.find(d => d.name === evidence.related_direction);
          if (matchingDir) {
            directionIdMap[evidence.related_direction] = matchingDir.id;
          }
        }
      });
      
      const directionId = directionIdMap[directionName] || 'dir_001';
      console.log(`[Evidence Navigation] Direction: ${directionName} -> ID: ${directionId}`);
      window.location.href = `direction-detail.html?id=${directionId}`;
    }
    
    // Initialize on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initEvidenceLibrary);
    } else {
      initEvidenceLibrary();
    }
  </script>
</body>
</html>
