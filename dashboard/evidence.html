<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>证据库 - 翡翠信号图谱</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page-specific styles for Evidence Wall */
    .evidence-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
    }
    
    @media (max-width: 968px) {
      .evidence-container {
        gap: var(--space-lg);
      }
    }
    
    /* === Statistics Section === */
    .evidence-statistics {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-sm);
    }
    
    .statistics-header {
      margin-bottom: var(--space-lg);
    }
    
    .statistics-header h2 {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-xs);
    }
    
    .statistics-header .subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    
    .statistics-charts {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: var(--space-xl);
    }
    
    @media (max-width: 968px) {
      .statistics-charts {
        grid-template-columns: 1fr;
      }
    }
    
    .chart-container {
      background-color: var(--color-bg-primary);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sm);
    }
    
    .chart-title {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-md);
    }
    
    .chart-svg {
      width: 100%;
      height: auto;
    }
    
    /* === Header with inline filters === */
    .evidence-header {
      background-color: var(--color-bg-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-sm);
    }
    
    .header-top {
      margin-bottom: var(--space-lg);
    }
    
    .header-top h1 {
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-sm);
    }
    
    .header-top .subtitle {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
    }
    
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-md);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--color-border-light);
    }
    
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border-medium);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
    }
    
    .filter-chip:hover {
      background-color: var(--color-bg-tertiary);
      border-color: var(--color-brand-primary);
      color: var(--color-brand-primary);
    }
    
    .filter-chip.active {
      background-color: var(--color-brand-primary);
      border-color: var(--color-brand-primary);
      color: white;
      font-weight: var(--font-weight-medium);
    }
    
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      align-items: center;
    }
    
    .filter-group-label {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: var(--space-sm);
    }
    
    /* === Evidence Wall (Waterfall Grid) === */
    .evidence-wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    
    @media (max-width: 1280px) {
      .evidence-wall {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }
    
    @media (max-width: 768px) {
      .evidence-wall {
        grid-template-columns: 1fr;
      }
    }
    
    .wall-card {
      background-color: var(--color-bg-primary);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      cursor: pointer;
      transition: all var(--transition-base);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      box-shadow: var(--shadow-sm);
    }
    
    .wall-card:hover {
      border-color: var(--color-brand-primary);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    
    .wall-card-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
    }
    
    .wall-card-icon {
      font-size: var(--font-size-2xl);
      flex-shrink: 0;
    }
    
    .wall-card-title-area {
      flex: 1;
      min-width: 0;
    }
    
    .wall-card-title {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-xs);
      line-height: var(--line-height-tight);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    
    .wall-card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
    }
    
    .wall-card-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    
    .wall-card-relevance {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    
    .wall-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--color-border-light);
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
    }
    
    .wall-card-direction {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-brand-primary);
      font-weight: var(--font-weight-medium);
    }
    
    .wall-card-source {
      flex-shrink: 0;
    }
    
    .no-results {
      grid-column: 1 / -1;
      background-color: var(--color-bg-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-3xl);
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    
    .no-results-icon {
      font-size: var(--font-size-4xl);
      margin-bottom: var(--space-lg);
    }
    
    .no-results h3 {
      font-size: var(--font-size-xl);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-sm);
    }
    
    .no-results p {
      font-size: var(--font-size-base);
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>
  <!-- Navigation bar will be auto-injected by nav.js -->
  <div id="nav-container"></div>

  <div class="container">
    <div class="evidence-container">
      <!-- === HEADER with Filters === -->
      <header class="evidence-header">
        <div class="header-top">
          <h1>证据库</h1>
          <p class="subtitle">
            精选高质量证据，展示每条证据如何支撑趋势判断、关联哪个方向、为什么重要。
            所有证据都经过策展，强调相关性和新鲜度，而非原始数据堆砌。
          </p>
        </div>
        
        <div class="filter-bar">
          <!-- Judgment state filters -->
          <div class="filter-group">
            <span class="filter-group-label">方向:</span>
            <div class="filter-chip active" data-filter-type="direction" data-filter-value="all">
              全部方向
            </div>
            <div id="direction-filters">
              <!-- Will be populated by JavaScript -->
            </div>
          </div>
          
          <!-- Type filters -->
          <div class="filter-group">
            <span class="filter-group-label">类型:</span>
            <div class="filter-chip active" data-filter-type="type" data-filter-value="all">
              全部类型
            </div>
            <div class="filter-chip" data-filter-type="type" data-filter-value="笔记">
              📝 笔记
            </div>
            <div class="filter-chip" data-filter-type="type" data-filter-value="图片">
              🖼️ 图片
            </div>
            <div class="filter-chip" data-filter-type="type" data-filter-value="评论">
              💬 评论
            </div>
          </div>
          
          <!-- Freshness filters -->
          <div class="filter-group">
            <span class="filter-group-label">新鲜度:</span>
            <div class="filter-chip active" data-filter-type="freshness" data-filter-value="all">
              全部
            </div>
            <div class="filter-chip" data-filter-type="freshness" data-filter-value="最近3天">
              最近3天
            </div>
            <div class="filter-chip" data-filter-type="freshness" data-filter-value="最近7天">
              最近7天
            </div>
            <div class="filter-chip" data-filter-type="freshness" data-filter-value="最近14天">
              最近14天
            </div>
          </div>
        </div>
      </header>
      
      <!-- === STATISTICS SECTION === -->
      <section class="evidence-statistics" id="evidence-statistics">
        <div class="statistics-header">
          <h2>证据分布统计</h2>
          <p class="subtitle">当前显示证据的类型和方向分布</p>
        </div>
        <div class="statistics-charts">
          <div class="chart-container">
            <h3 class="chart-title">证据类型分布</h3>
            <svg class="chart-svg" id="type-distribution-chart" viewBox="0 0 300 200" preserveAspectRatio="xMidYMid meet">
              <!-- Will be populated by JavaScript -->
            </svg>
          </div>
          <div class="chart-container">
            <h3 class="chart-title">方向证据分布</h3>
            <svg class="chart-svg" id="direction-distribution-chart" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet">
              <!-- Will be populated by JavaScript -->
            </svg>
          </div>
        </div>
      </section>
      
      <!-- === EVIDENCE WALL (Waterfall Grid) === -->
      <div class="evidence-wall" id="evidence-wall">
        <!-- Will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Load shared JavaScript modules -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/nav.js"></script>

  <!-- Page-specific initialization -->
  <script>
    // Global state
    let allEvidence = [];
    let filteredEvidence = [];
    let activeFilters = {
      direction: 'all',
      type: 'all',
      freshness: 'all'
    };
    
    /**
     * Get direction name from URL parameter (for pre-filtering)
     */
    function getDirectionFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('direction') || null;
    }
    
    /**
     * Initialize the Evidence Library page
     */
    async function initEvidenceLibrary() {
      try {
        // Load dashboard data
        const data = await loadDashboardData();
        
        // Store all evidence
        allEvidence = getEvidenceEntries(data);
        
        // Initialize direction filters
        initializeDirectionFilters(data);
        
        // Check for direction pre-filter from URL
        const directionParam = getDirectionFromUrl();
        if (directionParam) {
          activeFilters.direction = directionParam;
          // Update the active filter chip if it exists
          setTimeout(() => {
            document.querySelectorAll('.filter-chip[data-filter-type="direction"]').forEach(chip => {
              if (chip.dataset.filterValue === directionParam) {
                chip.classList.add('active');
              } else if (chip.dataset.filterValue === 'all') {
                chip.classList.remove('active');
              }
            });
          }, 0);
        }
        
        // Apply filters and render
        applyFilters();
        
        // Set up filter event listeners
        setupFilterListeners();
        
      } catch (error) {
        console.error('Failed to initialize evidence library:', error);
        const container = document.querySelector('.evidence-container');
        container.innerHTML = `
          <div class="card" style="text-align: center; padding: var(--space-2xl);">
            <div class="card-body">
              <h2 style="font-size: var(--font-size-3xl); color: var(--color-danger); margin-bottom: var(--space-lg);">
                ❌ 数据加载失败
              </h2>
              <p style="font-size: var(--font-size-lg); color: var(--color-text-secondary); margin-bottom: var(--space-md);">
                无法加载证据库数据。请检查数据文件是否存在，或稍后重试。
              </p>
              <p style="font-size: var(--font-size-sm); color: var(--color-text-tertiary); margin-bottom: var(--space-xl);">
                错误信息: <span class="error-message-placeholder"></span>
              </p>
              <a href="index.html" class="button" style="display: inline-block; background-color: var(--color-brand-primary); color: white; padding: var(--space-md) var(--space-xl); border-radius: var(--radius-md); text-decoration: none; font-weight: var(--font-weight-semibold); margin-right: var(--space-md);">
                返回首页
              </a>
              <button onclick="location.reload()" class="button" style="display: inline-block; background-color: var(--color-secondary); color: white; padding: var(--space-md) var(--space-xl); border-radius: var(--radius-md); border: none; cursor: pointer; font-weight: var(--font-weight-semibold);">
                重新加载
              </button>
            </div>
          </div>
        `;
        // Safely insert error message using textContent
        container.querySelector('.error-message-placeholder').textContent = error.message;
      }
    }
    
    /**
     * Initialize direction filter chips
     */
    function initializeDirectionFilters(data) {
      const directions = getTrendDirections(data);
      
      // Cache directions globally for dynamic ID mapping
      window.cachedDirections = directions;
      
      const container = document.getElementById('direction-filters');
      
      if (!container) return;
      
      // Create filter chips for each direction
      container.innerHTML = directions.map(dir => `
        <div class="filter-chip" data-filter-type="direction" data-filter-value="${dir.name}">
          ${dir.name}
        </div>
      `).join('');
    }
    
    /**
     * Set up filter event listeners
     */
    function setupFilterListeners() {
      // Listen to all filter chips
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', function() {
          const filterType = this.dataset.filterType;
          const filterValue = this.dataset.filterValue;
          
          // Remove active from siblings
          const siblings = this.parentElement.querySelectorAll('.filter-chip');
          siblings.forEach(s => s.classList.remove('active'));
          
          // Add active to clicked chip
          this.classList.add('active');
          
          // Update active filters
          activeFilters[filterType] = filterValue;
          
          // Re-apply filters
          applyFilters();
        });
      });
    }
    
    /**
     * Apply filters to evidence list
     */
    function applyFilters() {
      filteredEvidence = allEvidence.filter(evidence => {
        // Direction filter
        if (activeFilters.direction !== 'all') {
          if (evidence.related_direction !== activeFilters.direction) {
            return false;
          }
        }
        
        // Type filter
        if (activeFilters.type !== 'all') {
          if (evidence.type !== activeFilters.type) {
            return false;
          }
        }
        
        // Freshness filter
        if (activeFilters.freshness !== 'all') {
          if (evidence.freshness !== activeFilters.freshness) {
            return false;
          }
        }
        
        return true;
      });
      
      // Render the statistics and evidence wall
      renderEvidenceStats(filteredEvidence);
      renderEvidenceWall();
    }
    
    /**
     * Render evidence statistics charts
     */
    function renderEvidenceStats(evidenceEntries) {
      renderTypeDistributionChart(evidenceEntries);
      renderDirectionDistributionChart(evidenceEntries);
    }
    
    /**
     * Render type distribution chart (horizontal bar chart)
     */
    function renderTypeDistributionChart(evidenceEntries) {
      const svg = document.getElementById('type-distribution-chart');
      if (!svg) return;
      
      // Clear existing content
      svg.innerHTML = '';
      
      // Count evidence by type
      const typeCounts = {};
      evidenceEntries.forEach(evidence => {
        const type = evidence.type;
        typeCounts[type] = (typeCounts[type] || 0) + 1;
      });
      
      // Convert to array and sort
      const typeData = Object.entries(typeCounts)
        .map(([type, count]) => ({ type, count }))
        .sort((a, b) => b.count - a.count);
      
      if (typeData.length === 0) {
        // Show empty state
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', '150');
        text.setAttribute('y', '100');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', '#6a7178');
        text.setAttribute('font-size', '14');
        text.textContent = '暂无数据';
        svg.appendChild(text);
        return;
      }
      
      // Chart dimensions
      const width = 300;
      const height = 200;
      const padding = { top: 10, right: 20, bottom: 30, left: 80 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      
      // Max count for scaling
      const maxCount = Math.max(...typeData.map(d => d.count));
      
      // Type colors
      const typeColors = {
        '笔记': '#3b82f6',
        '图片': '#10b981',
        '评论': '#f59e0b',
        '视频': '#8b5cf6'
      };
      
      // Bar height
      const barHeight = chartHeight / typeData.length * 0.7;
      const barSpacing = chartHeight / typeData.length;
      
      // Render bars
      typeData.forEach((item, index) => {
        const barWidth = (item.count / maxCount) * chartWidth;
        const y = padding.top + index * barSpacing + (barSpacing - barHeight) / 2;
        
        // Bar
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', padding.left);
        rect.setAttribute('y', y);
        rect.setAttribute('width', barWidth);
        rect.setAttribute('height', barHeight);
        rect.setAttribute('fill', typeColors[item.type] || '#6b7280');
        rect.setAttribute('rx', '4');
        svg.appendChild(rect);
        
        // Type label (left)
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', padding.left - 10);
        label.setAttribute('y', y + barHeight / 2);
        label.setAttribute('text-anchor', 'end');
        label.setAttribute('dominant-baseline', 'middle');
        label.setAttribute('fill', '#1a1d21');
        label.setAttribute('font-size', '13');
        label.setAttribute('font-weight', '500');
        label.textContent = item.type;
        svg.appendChild(label);
        
        // Count label (right)
        const countLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        countLabel.setAttribute('x', padding.left + barWidth + 5);
        countLabel.setAttribute('y', y + barHeight / 2);
        countLabel.setAttribute('text-anchor', 'start');
        countLabel.setAttribute('dominant-baseline', 'middle');
        countLabel.setAttribute('fill', '#4a5056');
        countLabel.setAttribute('font-size', '12');
        countLabel.setAttribute('font-weight', '600');
        countLabel.textContent = item.count;
        svg.appendChild(countLabel);
      });
    }
    
    /**
     * Render direction distribution chart (horizontal bar chart)
     */
    function renderDirectionDistributionChart(evidenceEntries) {
      const svg = document.getElementById('direction-distribution-chart');
      if (!svg) return;
      
      // Clear existing content
      svg.innerHTML = '';
      
      // Count evidence by direction
      const directionCounts = {};
      evidenceEntries.forEach(evidence => {
        const direction = evidence.related_direction;
        directionCounts[direction] = (directionCounts[direction] || 0) + 1;
      });
      
      // Convert to array and sort by count (descending)
      const directionData = Object.entries(directionCounts)
        .map(([direction, count]) => ({ direction, count }))
        .sort((a, b) => b.count - a.count);
      
      if (directionData.length === 0) {
        // Show empty state
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', '300');
        text.setAttribute('y', '150');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', '#6a7178');
        text.setAttribute('font-size', '14');
        text.textContent = '暂无数据';
        svg.appendChild(text);
        return;
      }
      
      // Chart dimensions
      const width = 600;
      const height = 300;
      const padding = { top: 10, right: 40, bottom: 30, left: 120 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      
      // Max count for scaling
      const maxCount = Math.max(...directionData.map(d => d.count));
      
      // Bar height
      const barHeight = Math.min(24, chartHeight / directionData.length * 0.7);
      const barSpacing = chartHeight / directionData.length;
      
      // Get judgment state for each direction
      const directionJudgments = {};
      if (window.cachedDirections) {
        window.cachedDirections.forEach(dir => {
          directionJudgments[dir.name] = dir.judgment_state;
        });
      }
      
      // Judgment state colors
      const judgmentColors = {
        '值得跟': '#10b981',
        '观察中': '#3b82f6',
        '短热噪音': '#f59e0b',
        '需要补证据': '#6b7280'
      };
      
      // Render bars
      directionData.forEach((item, index) => {
        const barWidth = (item.count / maxCount) * chartWidth;
        const y = padding.top + index * barSpacing + (barSpacing - barHeight) / 2;
        const judgment = directionJudgments[item.direction] || '需要补证据';
        const color = judgmentColors[judgment] || '#6b7280';
        
        // Bar
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', padding.left);
        rect.setAttribute('y', y);
        rect.setAttribute('width', barWidth);
        rect.setAttribute('height', barHeight);
        rect.setAttribute('fill', color);
        rect.setAttribute('rx', '4');
        svg.appendChild(rect);
        
        // Direction label (left) - truncate if too long
        const directionName = item.direction.length > 12 ? item.direction.substring(0, 11) + '…' : item.direction;
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', padding.left - 10);
        label.setAttribute('y', y + barHeight / 2);
        label.setAttribute('text-anchor', 'end');
        label.setAttribute('dominant-baseline', 'middle');
        label.setAttribute('fill', '#1a1d21');
        label.setAttribute('font-size', '12');
        label.setAttribute('font-weight', '500');
        label.textContent = directionName;
        svg.appendChild(label);
        
        // Count label (right)
        const countLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        countLabel.setAttribute('x', padding.left + barWidth + 5);
        countLabel.setAttribute('y', y + barHeight / 2);
        countLabel.setAttribute('text-anchor', 'start');
        countLabel.setAttribute('dominant-baseline', 'middle');
        countLabel.setAttribute('fill', '#4a5056');
        countLabel.setAttribute('font-size', '12');
        countLabel.setAttribute('font-weight', '600');
        countLabel.textContent = item.count;
        svg.appendChild(countLabel);
      });
    }
    
    /**
     * Render evidence wall (waterfall grid)
     */
    function renderEvidenceWall() {
      const container = document.getElementById('evidence-wall');
      
      if (!container) return;
      
      if (filteredEvidence.length === 0) {
        container.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">🔍</div>
            <h3>未找到匹配的证据</h3>
            <p>请尝试调整筛选条件查看更多证据</p>
          </div>
        `;
        return;
      }
      
      const typeIconMap = {
        '笔记': '📝',
        '图片': '🖼️',
        '评论': '💬'
      };
      
      const weightBadgeMap = {
        'high': 'badge-success',
        'medium': 'badge-warning',
        'low': 'badge-info'
      };
      
      const weightLabelMap = {
        'high': '高权重',
        'medium': '中权重',
        'low': '低权重'
      };
      
      container.innerHTML = filteredEvidence.map(evidence => {
        const typeIcon = typeIconMap[evidence.type] || '📄';
        const weightBadge = weightBadgeMap[evidence.weight] || 'badge-warning';
        const weightLabel = weightLabelMap[evidence.weight] || '中权重';
        
        return `
          <div class="wall-card" onclick="navigateToDirection('${evidence.related_direction}')">
            <div class="wall-card-header">
              <div class="wall-card-icon">${typeIcon}</div>
              <div class="wall-card-title-area">
                <h3 class="wall-card-title">${evidence.title}</h3>
                <div class="wall-card-badges">
                  <span class="badge badge-sm ${weightBadge}">${weightLabel}</span>
                  <span class="badge badge-sm badge-info">${evidence.type}</span>
                  <span class="freshness" style="font-size: var(--font-size-xs);">${evidence.freshness}</span>
                </div>
              </div>
            </div>
            
            <div class="wall-card-content">
              <div class="wall-card-relevance">
                <strong>为什么重要:</strong> ${evidence.relevance_explanation}
              </div>
              
              <div class="wall-card-meta">
                <span class="wall-card-direction">→ ${evidence.related_direction}</span>
                <span class="wall-card-source">${evidence.source}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    /**
     * Navigate to direction detail page
     */
    function navigateToDirection(directionName) {
      // Build direction-name-to-ID map dynamically from loaded data
      // This prevents hardcoding bugs where IDs get swapped
      const directionIdMap = {};
      allEvidence.forEach(evidence => {
        // Build map from evidence's related_direction field
        if (evidence.related_direction && !directionIdMap[evidence.related_direction]) {
          // Find the actual direction object to get its ID
          const matchingDir = window.cachedDirections?.find(d => d.name === evidence.related_direction);
          if (matchingDir) {
            directionIdMap[evidence.related_direction] = matchingDir.id;
          }
        }
      });
      
      const directionId = directionIdMap[directionName] || 'dir_001';
      console.log(`[Evidence Navigation] Direction: ${directionName} -> ID: ${directionId}`);
      window.location.href = `direction-detail.html?id=${directionId}`;
    }
    
    // Initialize on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initEvidenceLibrary);
    } else {
      initEvidenceLibrary();
    }
  </script>
</body>
</html>
